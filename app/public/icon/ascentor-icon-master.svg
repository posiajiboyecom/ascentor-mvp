<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="roundclip">
      <rect width="1024" height="1024" rx="184.32" ry="184.32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0C0B08" rx="184.32" ry="184.32"/>

  <g clip-path="url(#roundclip)">
    <!-- Full gold outer triangle -->
    <polygon
      points="512.00,163.43 890.88,860.57 133.12,860.57"
      fill="#E8A020"/>

    <!-- Background inner triangle cutout — creates hollow outline -->
    <polygon
      points="512.00,271.36 821.25,822.27 202.75,822.27"
      fill="#0C0B08"/>

    <!-- Crossbar — gold rectangle spanning the legs -->
    <rect
      x="299.83"
      y="522.08"
      width="424.35"
      height="63.49"
      fill="#E8A020"/>
  </g>
</svg>